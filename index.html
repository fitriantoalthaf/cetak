<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabinta Booklet Generator Pro</title>

<meta name="description" content="Generator Imposisi A5 ke A4 untuk Foxit PDF, PDF Element dan Percetakan">
<meta name="theme-color" content="#6366f1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f8fafc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--primary:#6366f1;
--success:#10b981;
--shadow:0 10px 30px rgba(0,0,0,.06);
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--border:#334155;
--shadow:0 10px 30px rgba(0,0,0,.35);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
}

.container{
max-width:1400px;
margin:auto;
padding:30px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.brand h1{
font-size:32px;
font-weight:800;
}

.brand p{
color:var(--muted);
margin-top:6px;
}

.theme-btn{
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
background:var(--card);
color:var(--text);
border:1px solid var(--border);
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:24px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.controls{
display:flex;
gap:12px;
flex-wrap:wrap;
align-items:center;
}

input{
padding:14px 16px;
border-radius:12px;
border:1px solid var(--border);
background:var(--bg);
color:var(--text);
font-size:16px;
width:200px;
}

button{
border:none;
cursor:pointer;
font-weight:600;
}

.primary{
background:var(--primary);
color:white;
padding:14px 22px;
border-radius:12px;
}

.success{
background:var(--success);
color:white;
padding:10px 16px;
border-radius:10px;
}

.secondary{
background:transparent;
border:1px solid var(--border);
color:var(--text);
padding:10px 16px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

@media(min-width:1000px){
.grid{
grid-template-columns:1fr 1fr;
}
}

.full{
grid-column:1/-1;
}

.section-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
gap:10px;
}

.section-title h3{
font-size:18px;
}

textarea{
width:100%;
height:220px;
padding:15px;
border-radius:14px;
border:1px solid var(--border);
background:var(--bg);
color:var(--text);
resize:vertical;
font-size:13px;
line-height:1.6;
}

.footer{
text-align:center;
margin-top:30px;
color:var(--muted);
font-size:14px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#10b981;
color:white;
padding:12px 18px;
border-radius:10px;
opacity:0;
pointer-events:none;
transition:.3s;
}

.toast.show{
opacity:1;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:15px;
}

.badge{
background:var(--bg);
border:1px solid var(--border);
padding:10px 14px;
border-radius:12px;
font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="brand">
<h1>📚 Sabinta Booklet Generator Pro</h1>
<p>Imposition Tool untuk Foxit PDF, PDF Element & Percetakan</p>
</div>

<button class="theme-btn" onclick="toggleTheme()">
🌙 Dark Mode
</button>
</div>

<div class="card">

<div class="controls">

<input
type="number"
id="totalPages"
value="116"
placeholder="Jumlah Halaman">

<button class="primary" onclick="generate()">
Generate
</button>

<button class="secondary" onclick="downloadTXT()">
Download TXT
</button>

</div>

<div class="stats">
<div class="badge" id="pageInfo">
Halaman: 116
</div>

<div class="badge" id="sheetInfo">
Lembar: 29
</div>
</div>

</div>

<div class="grid">

<div class="card">

<div class="section-title">
<h3>Buku A</h3>
<button class="success" onclick="copyText('bookA')">
Copy
</button>
</div>

<textarea id="bookA"></textarea>

</div>

<div class="card">

<div class="section-title">
<h3>Buku B</h3>
<button class="success" onclick="copyText('bookB')">
Copy
</button>
</div>

<textarea id="bookB"></textarea>

</div>

<div class="card full">

<div class="section-title">
<h3>Gabungan (Siap Tempel ke Foxit)</h3>
<button class="success" onclick="copyText('finalResult')">
Copy Semua
</button>
</div>

<textarea id="finalResult"></textarea>

</div>

</div>

<div class="footer">
© 2026 Sabinta Printing • Powered by BejiBook Engine
</div>

</div>

<div id="toast" class="toast">
Berhasil disalin
</div>

<script>

function generate(){

let total =
parseInt(document.getElementById('totalPages').value);

if(!total || total < 4){
alert('Minimal 4 halaman');
return;
}

if(total % 4 !== 0){
total += (4 - total % 4);
}

let A = [];

let left = 1;
let right = total;

while(left < right){

A.push(left);
A.push(right);

A.push(right - 1);
A.push(left + 1);

left += 2;
right -= 2;
}

let B = [];

for(let i=A.length-1;i>=0;i-=4){

B.push(A[i-1]);
B.push(A[i]);

B.push(A[i-3]);
B.push(A[i-2]);
}

document.getElementById('bookA').value =
A.join(',');

document.getElementById('bookB').value =
B.join(',');

document.getElementById('finalResult').value =
A.join(',') + ',' + B.join(',');

document.getElementById('pageInfo').innerText =
'Halaman: ' + total;

document.getElementById('sheetInfo').innerText =
'Lembar: ' + (total/4);

}

function copyText(id){

navigator.clipboard.writeText(
document.getElementById(id).value
);

showToast('Berhasil disalin');
}

function downloadTXT(){

let text =
document.getElementById('finalResult').value;

let blob =
new Blob([text], {type:'text/plain'});

let a =
document.createElement('a');

a.href =
URL.createObjectURL(blob);

a.download =
'booklet-generator.txt';

a.click();
}

function toggleTheme(){

document.body.classList.toggle('dark');

localStorage.setItem(
'theme',
document.body.classList.contains('dark')
? 'dark'
: 'light'
);

}

if(localStorage.getItem('theme')==='dark'){
document.body.classList.add('dark');
}

function showToast(msg){

const toast =
document.getElementById('toast');

toast.innerText = msg;

toast.classList.add('show');

setTimeout(()=>{
toast.classList.remove('show');
},2000);
}

generate();

</script>

</body>
</html>
